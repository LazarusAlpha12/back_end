server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
         routes:
          - id: auth-service
            uri: http://auth-service:8081
            predicates:
              - Path=/auth/**

          - id: user-service
            uri: http://user-service:8082
            predicates:
              - Path=/api/usuarios/**

          - id: order-service
            uri: http://order-service:8083
            predicates:
              - Path=/api/pedidos/**,/api/historial/**,/api/ubicaciones/**